# tmux-minimal.conf — drop to ~/.tmux.conf on remote machines
# Compatible with tmux 2.7+. No plugins, no external scripts.

# ── Terminal ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── General ────────────────────────────────────────────────────────────────────
set -g bell-action none
set -g history-limit 10000
set -s escape-time 50
setw -g alternate-screen on

# ── Indexing ───────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Mouse ──────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Window behaviour ───────────────────────────────────────────────────────────
setw -g automatic-rename on
set -g status-interval 1

# ── Key bindings ───────────────────────────────────────────────────────────────

# Passthrough prefix to inner (nested) tmux session
bind-key -n C-g send-prefix

# Reload this config
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf sourced"

# Window navigation
bind -n S-Right next-window
bind -n S-Left  previous-window

# New window / splits in current directory
bind c   new-window      -c "#{pane_current_path}"
bind |   split-window -h -c "#{pane_current_path}"
bind _   split-window -v -c "#{pane_current_path}"
bind '\'  split-window -h -p 33 -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Session management
bind S   command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K   confirm kill-session
bind C-f command-prompt -p find-session "switch-client -t %%"

# Toggles
bind m set monitor-activity
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position top
set -g status "on"
set -g status-justify "left"
set -g status-interval 1

# ── Theme: Tokyo Night (Night) ─────────────────────────────────────────────────
set -g mode-style            "fg=#7aa2f7,bg=#292e42"
set -g message-style         "fg=#7aa2f7,bg=#292e42"
set -g message-command-style "fg=#7aa2f7,bg=#292e42"

set -g pane-border-style        "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

set -g window-active-style "bg=#000000"
set -g window-style        "bg=#1a1b26"

set -g status-style        "fg=#7aa2f7,bg=#16161e"
set -g status-left-style   NONE
set -g status-right-style  NONE
set -g status-left-length  100
set -g status-right-length 100

# Left: [C]/[N] mode indicator + session name
set -g status-left "#{?pane_in_mode,#[fg=#16161e]#[bg=#e0af68]#[bold] [C] #[fg=#e0af68]#[bg=#16161e]#[nobold],#[fg=#16161e]#[bg=#9ece6a]#[bold] [N] #[fg=#9ece6a]#[bg=#16161e]#[nobold]}#[fg=#16161e]#[bg=#7aa2f7]#[bold] #S #[fg=#7aa2f7]#[bg=#16161e]#[nobold]"

# Right: date/time + user@host
set -g status-right "#[fg=#7aa2f7]#[bg=#292e42] %Y-%m-%d  %H:%M #[fg=#292e42]#[bg=#16161e]#[fg=#16161e]#[bg=#7aa2f7]#[bold] #U@#H "

setw -g window-status-activity-style   "underscore,fg=#c0caf5,bg=#16161e"
setw -g window-status-separator        " "
setw -g window-status-style            "NONE,fg=#c0caf5,bg=#16161e"
setw -g window-status-format          " #I  #W #F "
setw -g window-status-current-format  "#[fg=#16161e]#[bg=#bb9af7]#[bold] #I  #W #F #[fg=#bb9af7]#[bg=#16161e]#[nobold]"
